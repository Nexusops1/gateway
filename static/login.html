<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS // AUTHENTICATE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #000000;
  --bg-deep: #050810;
  --bg-surface: #080c12;
  --cyan-core: #00e5ff;
  --cyan-bright: #00e5ff;
  --cyan-dim: #00b8cc;
  --cyan-glow: #00e5ff66;
  --cyan-faint: #00e5ff15;
  --white-pure: #ffffff;
  --white-dim: #cccccc;
  --white-muted: #666666;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg-void);
  color:var(--white-dim);
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  letter-spacing:0.15em;
}
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,#00e5ff08 1px,transparent 1px);
  background-size:40px 40px;
}
.scan-beam{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.scan-beam::after{
  content:'';position:absolute;width:200%;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan-core),transparent);
  top:-2px;left:-50%;transform:rotate(35deg);
  opacity:0.25;filter:blur(2px);animation:beamSweep 3s linear infinite;
}
@keyframes beamSweep{0%{top:-10%;left:-50%}100%{top:110%;left:-50%}}

.hud-frame{position:relative}
.hud-frame::before,.hud-frame::after{
  content:'';position:absolute;width:20px;height:20px;
  border-color:var(--cyan-dim);border-style:solid;pointer-events:none;
  animation:hudDraw 0.8s ease-out both;
}
.hud-frame::before{top:-1px;left:-1px;border-width:2px 0 0 2px;border-radius:0}
.hud-frame::after{top:-1px;right:-1px;border-width:2px 2px 0 0}
.hud-inner::before,.hud-inner::after{
  content:'';position:absolute;width:20px;height:20px;
  border-color:var(--cyan-dim);border-style:solid;pointer-events:none;
  animation:hudDraw 0.8s ease-out 0.2s both;
}
.hud-inner::before{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.hud-inner::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
@keyframes hudDraw{from{width:0;height:0;opacity:0}to{width:20px;height:20px;opacity:1}}

.login-panel{
  position:relative;z-index:2;width:420px;padding:40px;
  background:var(--bg-deep);border:1px solid var(--cyan-dim);
  clip-path:polygon(15px 0,calc(100% - 15px) 0,100% 15px,100% calc(100% - 15px),calc(100% - 15px) 100%,15px 100%,0 calc(100% - 15px),0 15px);
  box-shadow:0 0 10px var(--cyan-glow),0 0 30px #00e5ff33,inset 0 0 10px #00e5ff11;
}

.nexus-title{
  font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;
  color:var(--cyan-core);text-align:center;
  text-shadow:0 0 10px var(--cyan-glow),0 0 40px #00e5ff33;
  letter-spacing:0.2em;animation:titleGlitch 5s infinite;
}
@keyframes titleGlitch{
  0%,98%,100%{transform:none;text-shadow:0 0 10px var(--cyan-glow),0 0 40px #00e5ff33}
  98.5%{transform:translateX(-3px) skewX(-1deg);text-shadow:3px 0 #00e5ff,-3px 0 #ff000088,0 0 10px var(--cyan-glow)}
  99%{transform:translateX(2px) skewX(1deg);text-shadow:-2px 0 #00e5ff,2px 0 #ff000088,0 0 10px var(--cyan-glow)}
  99.5%{transform:translateX(-1px);text-shadow:1px 0 #00e5ff,-1px 0 #ff000088,0 0 10px var(--cyan-glow)}
}
.subtitle{text-align:center;font-size:11px;color:var(--white-muted);letter-spacing:0.3em;margin-top:4px}
.divider{height:1px;background:var(--cyan-dim);margin:24px 0;animation:divExpand 1s ease-out 0.5s both;transform-origin:left}
@keyframes divExpand{from{transform:scaleX(0)}to{transform:scaleX(1)}}

.scan-bars{display:flex;gap:4px;justify-content:center;margin-bottom:20px;height:3px}
.scan-bars span{width:60px;height:2px;background:var(--cyan-core);opacity:0;animation:scanPulse 2s ease-in-out infinite}
.scan-bars span:nth-child(2){animation-delay:0.3s}
.scan-bars span:nth-child(3){animation-delay:0.6s}
@keyframes scanPulse{0%,100%{opacity:0}50%{opacity:0.6}}

label{display:block;font-size:10px;color:var(--cyan-dim);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:6px}
input{
  width:100%;padding:12px;margin-bottom:20px;
  background:var(--bg-surface);border:1px solid var(--cyan-dim);
  color:var(--cyan-bright);font-family:'Share Tech Mono',monospace;
  font-size:14px;letter-spacing:0.1em;outline:none;transition:all 0.2s;
}
input:focus{border-color:var(--cyan-core);box-shadow:0 0 8px var(--cyan-glow),inset 0 0 4px #00e5ff11;background:#080c12}
input::placeholder{color:#666}

.auth-btn{
  width:100%;padding:14px;background:transparent;
  border:1px solid var(--cyan-core);
  clip-path:polygon(10px 0,calc(100% - 10px) 0,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 10px),0 10px);
  color:var(--cyan-core);font-family:'Orbitron',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:0.3em;
  cursor:pointer;position:relative;overflow:hidden;transition:all 0.3s;
}
.auth-btn:hover{background:#00e5ff15;text-shadow:0 0 8px var(--cyan-glow);box-shadow:0 0 15px var(--cyan-glow)}
.auth-btn:active{background:#00e5ff33}
.auth-btn::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,#00e5ff22,transparent);transition:left 0.5s;
}
.auth-btn:hover::after{left:100%}

.panel-footer{text-align:center;margin-top:24px;font-size:9px;color:#888;letter-spacing:0.2em}
.secure-badge{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;font-size:9px;color:#888}
.secure-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan-dim);animation:securePulse 2s ease-in-out infinite}
@keyframes securePulse{0%,100%{opacity:0.3}50%{opacity:1;box-shadow:0 0 6px var(--cyan-core)}}

.error{
  background:#00e5ff11;border:1px solid #00e5ff44;
  padding:10px;margin-bottom:16px;text-align:center;
  font-size:11px;color:var(--cyan-bright);letter-spacing:0.1em;
  clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0 calc(100% - 8px),0 8px);
}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="scan-beam"></div>
<form class="login-panel hud-frame" method="POST" action="/auth/login">
  <div class="hud-inner">
    <div class="nexus-title">NEXUS</div>
    <div class="subtitle">COMMAND CENTER</div>
    <div class="divider"></div>
    <div class="scan-bars"><span></span><span></span><span></span></div>
    <!-- ERROR_MSG -->
    <label for="username">USERNAME</label>
    <input type="text" id="username" name="username" required autocomplete="username" placeholder="enter username">
    <label for="password">PASSWORD</label>
    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="enter password">
    <button type="submit" class="auth-btn">AUTHENTICATE</button>
    <div class="panel-footer">
      NEXUS LABS // PRAXIUM HOLDINGS
      <div class="secure-badge">
        <span class="secure-dot"></span> SECURE CONNECTION
      </div>
    </div>
  </div>
</form>
</body>
</html>
