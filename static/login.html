<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060a10;
    color: #c8d6e5;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #0c1018;
    border: 1px solid #1a2436;
    border-radius: 8px;
    padding: 40px;
    width: 360px;
    text-align: center;
  }
  .logo {
    font-size: 20px;
    font-weight: 700;
    color: #00e5ff;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 11px;
    color: #3a4a5c;
    letter-spacing: 2px;
    margin-bottom: 32px;
  }
  label {
    display: block;
    text-align: left;
    font-size: 10px;
    color: #5a6e84;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    background: #101620;
    border: 1px solid #1a2436;
    border-radius: 4px;
    color: #e8f0fa;
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #00e5ff; }
  button {
    width: 100%;
    padding: 10px;
    background: #00e5ff;
    color: #060a10;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .error {
    background: rgba(255,23,68,0.1);
    color: #ff1744;
    border: 1px solid rgba(255,23,68,0.2);
    border-radius: 4px;
    padding: 8px;
    font-size: 12px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<form class="login-box" method="POST" action="/auth/login">
  <div class="logo">NEXUS</div>
  <div class="subtitle">COMMAND CENTER</div>
  <!-- ERROR_MSG -->
  <label for="username">Username</label>
  <input type="text" id="username" name="username" required autocomplete="username">
  <label for="password">Password</label>
  <input type="password" id="password" name="password" required autocomplete="current-password">
  <button type="submit">AUTHENTICATE</button>
</form>
</body>
</html>
